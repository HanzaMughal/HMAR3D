<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="BurgerAR — Augmented Reality experience. Point your camera at the marker image to see the 3D burger." />
  <meta name="theme-color" content="#000000" />
  <title>BurgerAR — AR Experience</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #000;
      overflow: hidden;
    }

    /* ── Start Screen (shown first, user must tap to start camera) ── */
    #start-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(145deg, #0a0a0c 0%, #1a0a00 50%, #0a0a0c 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 20px;
      padding: 30px;
      text-align: center;
    }

    #start-screen .logo-icon { font-size: 80px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }

    #start-screen h1 {
      color: #fff;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    #start-screen h1 span { color: #FF9F1C; }

    #start-screen p {
      color: rgba(255,255,255,0.65);
      font-size: 16px;
      line-height: 1.6;
      max-width: 300px;
    }

    #start-btn {
      margin-top: 10px;
      background: linear-gradient(135deg, #FF9F1C, #FF6B35);
      color: #fff;
      border: none;
      padding: 18px 48px;
      border-radius: 50px;
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(255,107,53,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #start-btn:active { transform: scale(0.96); box-shadow: 0 4px 15px rgba(255,107,53,0.4); }

    #start-screen .back-link {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      text-decoration: none;
      margin-top: 5px;
    }

    #start-screen .camera-info {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 20px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
    }

    #start-screen .camera-info span:first-child { font-size: 20px; }

    /* ── A-Frame scene takes full screen ── */
    a-scene {
      width: 100vw;
      height: 100vh;
    }

    /* ── AR UI Overlay (shown during AR) ── */
    #ar-ui {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    #ar-ui.visible { display: block; }

    /* Back button */
    #back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      pointer-events: all;
      -webkit-tap-highlight-color: transparent;
    }

    /* Live badge */
    #live-badge {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #00d46a;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* Scan instructions */
    #scan-tip {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px 28px;
      border-radius: 50px;
      white-space: nowrap;
      transition: opacity 0.4s;
    }

    #scan-tip.hidden { opacity: 0; pointer-events: none; }

    /* Target detected toast */
    #target-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,212,106,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,212,106,0.4);
      color: #00d46a;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 50px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    #target-toast.visible { opacity: 1; }

    /* Error screen */
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a0c;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 30px;
      text-align: center;
      z-index: 9999;
    }

    #error-screen.visible { display: flex; }
    #error-screen .err-icon { font-size: 56px; }
    #error-screen h2 { color: #fff; font-size: 22px; font-weight: 700; }
    #error-screen p { color: rgba(255,255,255,0.6); font-size: 15px; line-height: 1.6; max-width: 320px; }

    .err-btn {
      background: linear-gradient(135deg, #FF9F1C, #FF6B35);
      color: #fff;
      border: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .err-btn-ghost {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.8);
      border: none;
      padding: 12px 30px;
      border-radius: 50px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════════
       START SCREEN — user must tap to trigger camera
       ══════════════════════════════════════════════ -->
  <div id="start-screen">
    <div class="logo-icon">🍔</div>
    <h1>Burger<span>AR</span></h1>
    <p>Point your camera at the marker image to see the 3D burger come to life!</p>

    <div class="camera-info">
      <span>📷</span>
      <span>Camera permission required for AR</span>
    </div>

    <button id="start-btn" onclick="startAR()">
      🚀 Start AR Experience
    </button>

    <a href="./index.html" class="back-link">← Go back</a>
  </div>

  <!-- ══════════════════════════════════════════════
       ERROR SCREEN
       ══════════════════════════════════════════════ -->
  <div id="error-screen">
    <div class="err-icon">⚠️</div>
    <h2 id="err-title">Something went wrong</h2>
    <p id="err-msg">An unexpected error occurred.</p>
    <a href="./index.html" class="err-btn">← Back to Home</a>
    <button class="err-btn-ghost" onclick="location.reload()">🔄 Retry</button>
  </div>

  <!-- ══════════════════════════════════════════════
       A-FRAME AR SCENE (hidden until user taps Start)
       This uses MindAR + A-Frame — the most reliable
       approach for WebAR on mobile browsers.
       ══════════════════════════════════════════════ -->
  <div id="ar-container">
    <a-scene
      id="ar-scene"
      style="display:none"
      mindar-image="imageTargetSrc: ./assets/targets/targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
    <!-- Assets (preloaded) -->
    <a-assets timeout="30000">
      <a-asset-item id="burger-model" src="./assets/models/burger.glb"></a-asset-item>
    </a-assets>

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false;"></a-camera>

    <!-- Image Target Anchor: index 0 = first image in targets.mind -->
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">

      <!-- 3D Burger Model -->
      <a-gltf-model
        id="burger-entity"
        src="#burger-model"
        position="0 0 0.1"
        rotation="0 0 0"
        scale="0.12 0.12 0.12"
        animation-mixer="loop: repeat; timeScale: 1;"
        animation__float="property: position; to: 0 0.05 0.1; dur: 1500; dir: alternate; loop: true; easing: easeInOutSine;"
        animation__spin="property: rotation; to: 0 360 0; dur: 8000; loop: true; easing: linear;"
        visible="true"
      ></a-gltf-model>

      <!-- Glow ring under burger -->
      <a-ring
        color="#FF9F1C"
        radius-inner="0.06"
        radius-outer="0.09"
        rotation="-90 0 0"
        position="0 -0.05 0.1"
        opacity="0.7"
        animation__glow="property: opacity; from: 0.7; to: 0.2; dur: 1200; dir: alternate; loop: true; easing: easeInOutSine;"
      ></a-ring>

    </a-entity>

    <!-- Ambient lighting -->
    <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
    <a-light type="directional" color="#fff4e0" intensity="1.8" position="1 2 2"></a-light>
    <a-light type="directional" color="#ff9f1c" intensity="0.6" position="-2 -1 -1"></a-light>
    <a-light type="point" color="#ffd700" intensity="0.8" distance="5" position="0 2 -1"></a-light>

  </a-scene>
</div>

  <!-- ══════════════════════════════════════════════
       AR UI OVERLAY (back button, live badge, tips)
       ══════════════════════════════════════════════ -->
  <div id="ar-ui">
    <button id="back-btn" onclick="stopAR()">← Back</button>
    <div id="live-badge">
      <div class="live-dot"></div>
      Live AR
    </div>
    <div id="scan-tip">📱 Point camera at the burger image</div>
    <div id="target-toast">✅ Target Detected!</div>
  </div>

  <!-- ══════════════════════════════════════════════
       A-FRAME + MINDAR SCRIPTS (loaded only once needed)
       We load these upfront so they are ready when
       the user taps Start.
       ══════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script>
    let sceneStarted = false;

    function showError(title, msg) {
      document.getElementById('err-title').textContent = title;
      document.getElementById('err-msg').textContent   = msg;
      document.getElementById('error-screen').classList.add('visible');
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('ar-scene').style.display     = 'none';
    }

async function startAR() {
    // Show AR container and scene UI
    document.getElementById('ar-container').style.display = 'block';
    sceneStarted = true;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('ar-scene').style.display = 'block';
    document.getElementById('ar-ui').classList.add('visible');

  // Start MindAR tracking (which will request camera permission via user gesture)
  const scene = document.getElementById('ar-scene');
  const arSystem = scene.systems['mindar-image-system'];
  if (arSystem) {
    try {
      await arSystem.start();
    } catch (err) {
      showError('⚙️ AR Engine Error', (err && err.message) ? err.message : 'Failed to start AR tracking.');
      return;
    }
  }

  // Listen for target found / lost events
  const target = document.getElementById('ar-target');
  if (target) {
    target.addEventListener('targetFound', () => {
      const toast = document.getElementById('target-toast');
      const tip = document.getElementById('scan-tip');
      if (toast) toast.classList.add('visible');
      if (tip) tip.classList.add('hidden');
      setTimeout(() => { if (toast) toast.classList.remove('visible'); }, 2000);
    });
    target.addEventListener('targetLost', () => {
      const tip = document.getElementById('scan-tip');
      if (tip) tip.classList.remove('hidden');
    });
  }
}

    function stopAR() {
      const scene    = document.getElementById('ar-scene');
      const arSystem = scene && scene.systems && scene.systems['mindar-image-system'];
      if (arSystem) {
        try { arSystem.stop(); } catch (_) {}
      }
      window.location.href = './index.html';
    }

    // Prevent pull-to-refresh during AR
    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) e.preventDefault();
    }, { passive: false });
  </script>

</body>
</html>
